# Order Service values
replicaCount: 1

image:
  repository: leelanaveen123/order
  tag: latest
  pullPolicy: Always

service:
  port: 80
  targetPort: 8000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

env:
  - name: PYTHONUNBUFFERED
    value: "1"

probes:
  liveness:
    enabled: true
    path: /health
    port: 8000
  readiness:
    enabled: true
    path: /ready
    port: 8000

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"
