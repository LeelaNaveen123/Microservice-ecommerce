# API Gateway values
replicaCount: 1

image:
  repository: leelanaveen123/api-gateway
  tag: latest
  pullPolicy: Always

service:
  port: 80
  targetPort: 3000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

env:
  - name: PRODUCT_SERVICE_URL
    value: "http://product-service"
  - name: ORDER_SERVICE_URL
    value: "http://order-service"
  - name: USER_SERVICE_URL
    value: "http://user-service"
  - name: NODE_ENV
    value: "production"

probes:
  liveness:
    enabled: true
    path: /health
    port: 3000
  readiness:
    enabled: true
    path: /ready
    port: 3000
